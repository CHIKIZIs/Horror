<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web 3D Horror</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
        }
        #ui {
            position: absolute;
            top: 50%;
            width: 100%;
            text-align: center;
            color: darkred;
            text-shadow: 2px 2px 5px black;
            cursor: pointer;
            z-index: 10;
        }
        h1 { font-size: 3rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; color: white; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>КЛИКНИ, ЧТОБЫ НАЧАТЬ</h1>
        <p>Управление: WASD - движение, Мышь - осмотреться</p>
        <p>Не дай ему догнать тебя.</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // 1. НАСТРОЙКА СЦЕНЫ И ТУМАНА
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        // Густой черный туман для атмосферы хоррора
        scene.fog = new THREE.FogExp2(0x000000, 0.15);

        // 2. КАМЕРА (Игрок)
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.y = 1.8; // Рост игрока

        // 3. РЕНДЕРЕР
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // Включаем тени
        document.body.appendChild(renderer.domElement);

        // 4. ОСВЕЩЕНИЕ (Фонарик игрока)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.02); // Очень тусклый общий свет
        scene.add(ambientLight);

        const flashLight = new THREE.SpotLight(0xffffff, 2, 15, Math.PI / 6, 0.5, 1);
        flashLight.position.set(0, 0, 0);
        flashLight.target.position.set(0, 0, -1);
        flashLight.castShadow = true;
        camera.add(flashLight);
        camera.add(flashLight.target);
        scene.add(camera);

        // 5. ОКРУЖЕНИЕ (Земля и колонны)
        const floorGeo = new THREE.PlaneGeometry(100, 100);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Добавим препятствия (деревья/колонны)
        const boxGeo = new THREE.BoxGeometry(1, 4, 1);
        const boxMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
        for (let i = 0; i < 50; i++) {
            const box = new THREE.Mesh(boxGeo, boxMat);
            box.position.set((Math.random() - 0.5) * 40, 2, (Math.random() - 0.5) * 40);
            box.castShadow = true;
            box.receiveShadow = true;
            scene.add(box);
        }

        // 6. МОНСТР
        const monsterGeo = new THREE.CylinderGeometry(0.5, 0.5, 3, 16);
        const monsterMat = new THREE.MeshStandardMaterial({ color: 0x880000, emissive: 0x220000 });
        const monster = new THREE.Mesh(monsterGeo, monsterMat);
        monster.position.set(0, 1.5, -15); // Появляется спереди вдалеке
        monster.castShadow = true;
        scene.add(monster);

        // Глаза монстра (светящиеся)
        const eyeGeo = new THREE.SphereGeometry(0.1);
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
        leftEye.position.set(-0.2, 1, 0.45);
        const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
        rightEye.position.set(0.2, 1, 0.45);
        monster.add(leftEye);
        monster.add(rightEye);

        // 7. УПРАВЛЕНИЕ (Pointer Lock API)
        const controls = new PointerLockControls(camera, document.body);
        const ui = document.getElementById('ui');

        ui.addEventListener('click', () => {
            controls.lock();
        });

        controls.addEventListener('lock', () => {
            ui.style.display = 'none';
        });

        controls.addEventListener('unlock', () => {
            ui.style.display = 'block';
        });

        // Клавиатура
        const move = { forward: false, backward: false, left: false, right: false };
        document.addEventListener('keydown', (e) => {
            if (e.code === 'KeyW') move.forward = true;
            if (e.code === 'KeyS') move.backward = true;
            if (e.code === 'KeyA') move.left = true;
            if (e.code === 'KeyD') move.right = true;
        });
        document.addEventListener('keyup', (e) => {
            if (e.code === 'KeyW') move.forward = false;
            if (e.code === 'KeyS') move.backward = false;
            if (e.code === 'KeyA') move.left = false;
            if (e.code === 'KeyD') move.right = false;
        });

        // 8. ИГРОВОЙ ЦИКЛ (Анимация)
        const clock = new THREE.Clock();
        const speed = 5.0; // Скорость игрока
        const monsterSpeed = 2.0; // Скорость монстра

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (controls.isLocked) {
                // Движение игрока
                const direction = new THREE.Vector3();
                if (move.forward) direction.z -= 1;
                if (move.backward) direction.z += 1;
                if (move.right) direction.x += 1;
                if (move.left) direction.x -= 1;
                
                direction.normalize(); // Чтобы по диагонали скорость не была выше
                
                controls.moveRight(direction.x * speed * delta);
                controls.moveForward(-direction.z * speed * delta);

                // ИИ Монстра: Поворачивается к игроку и медленно идет
                monster.lookAt(camera.position.x, monster.position.y, camera.position.z);
                monster.translateZ(monsterSpeed * delta);

                // Проверка столкновения (Скример / Конец игры)
                const distance = camera.position.distanceTo(monster.position);
                if (distance < 1.5) {
                    controls.unlock();
                    ui.innerHTML = "<h1 style='color: red; font-size: 5rem;'>ПОЙМАН</h1><p>Обновите страницу.</p>";
                    ui.style.display = 'block';
                }
            }

            renderer.render(scene, camera);
        }

        // Адаптация под размер окна
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
