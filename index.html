<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backrooms - The Entity</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; user-select: none; }
        #ui, #game-ui { position: absolute; width: 100%; text-align: center; z-index: 10; }
        #ui { top: 40%; color: #e2c044; text-shadow: 2px 2px 4px #000; cursor: pointer; }
        #game-ui { top: 20px; color: #fff; display: none; font-size: 1.1rem; text-shadow: 1px 1px 2px #000; }
        #interaction-text { position: absolute; top: 60%; width: 100%; text-align: center; color: #fff; font-size: 1.2rem; display: none; z-index: 10; }
        h1 { font-size: 3.5rem; margin: 0; }
        .glitch { color: #ff0000; font-weight: bold; }
    </style>
</head>
<body>
    <audio id="bgm" loop><source src="1.mp4" type="audio/mp4"></audio>
    <div id="ui">
        <h1>BACKROOMS</h1>
        <p>Найди 5 ключей в тумбах, чтобы найти выход из уровня 0.</p>
        <p>Кликни, чтобы войти в пустоту...</p>
    </div>
    <div id="game-ui">
        Объекты: <span id="key-count">0 / 5</span> | 
        <span id="direction">Связь стабильна</span>
    </div>
    <div id="interaction-text">[ E ] Обыскать</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- ГЕНЕРАЦИЯ ТЕКСТУР (Backrooms Style) ---
        function createBackroomsWall() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#dbcc87'; ctx.fillRect(0,0,512,512);
            // Паттерн обоев
            ctx.strokeStyle = '#c4b36a'; ctx.lineWidth = 2;
            for(let i=0; i<512; i+=32) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 512); ctx.stroke();
            }
            // Грязь
            for(let i=0; i<3000; i++) {
                ctx.fillStyle = `rgba(100, 90, 50, ${Math.random()*0.1})`;
                ctx.fillRect(Math.random()*512, Math.random()*512, 4, 4);
            }
            return new THREE.CanvasTexture(canvas);
        }

        function createCarpet() {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#7a6a35'; ctx.fillRect(0,0,256,256);
            for(let i=0; i<10000; i++) {
                let v = Math.random() * 20;
                ctx.fillStyle = `rgb(${110+v}, ${100+v}, ${50+v})`;
                ctx.fillRect(Math.random()*256, Math.random()*256, 1, 1);
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(40, 40);
            return tex;
        }

        // --- СЦЕНА ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a0a);
        scene.fog = new THREE.FogExp2(0x1a1a0a, 0.05);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- ОСВЕЩЕНИЕ ---
        const ambient = new THREE.AmbientLight(0xfff5d1, 0.05);
        scene.add(ambient);

        // Фонарик (тусклый)
        const flashlight = new THREE.SpotLight(0xffffff, 1.5, 30, Math.PI/6, 0.5);
        camera.add(flashlight);
        camera.add(flashlight.target);
        flashlight.target.position.z = -1;
        scene.add(camera);

        // --- МИР ---
        const wallTex = createBackroomsWall();
        const wallMat = new THREE.MeshStandardMaterial({ map: wallTex, roughness: 1 });
        
        // Пол и Потолок
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(150, 150), new THREE.MeshStandardMaterial({ map: createCarpet() }));
        floor.rotation.x = -Math.PI/2;
        floor.receiveShadow = true;
        scene.add(floor);

        const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(150, 150), new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 1 }));
        ceiling.position.y = 5;
        ceiling.rotation.x = Math.PI/2;
        scene.add(ceiling);

        const walls = new THREE.Group();
        const wallBoxes = [];
        function addWall(x, z, w, d) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, 5, d), wallMat);
            mesh.position.set(x, 2.5, z);
            walls.add(mesh);
            const box = new THREE.Box3().setFromObject(mesh);
            wallBoxes.push(box);
        }

        // Генерация лабиринта и ламп
        const lights = [];
        for(let i=0; i<60; i++) {
            let x = (Math.random()-0.5)*130;
            let z = (Math.random()-0.5)*130;
            if(Math.abs(x) < 5 && Math.abs(z) < 5) continue;
            
            // Стены
            let isCol = Math.random() > 0.7;
            addWall(x, z, isCol ? 2 : 12, isCol ? 12 : 2);

            // Редкие лампы (люстры) на потолке
            if(Math.random() > 0.8) {
                const lampGeo = new THREE.BoxGeometry(1.5, 0.2, 0.8);
                const lamp = new THREE.Mesh(lampGeo, new THREE.MeshBasicMaterial({ color: 0xffffcc }));
                lamp.position.set(x, 4.9, z);
                scene.add(lamp);

                const pLight = new THREE.PointLight(0xffffee, 0.6, 15);
                pLight.position.set(x, 4.5, z);
                scene.add(pLight);
                lights.push({ mesh: lamp, light: pLight, timer: Math.random()*10 });
            }
        }
        scene.add(walls);

        // --- ОБЪЕКТЫ (КЛЮЧИ) ---
        const items = [];
        let keysFound = 0;
        for(let i=0; i<10; i++) {
            const box = new THREE.Mesh(new THREE.BoxGeometry(1, 1.5, 1), new THREE.MeshStandardMaterial({ color: 0x444444 }));
            let x = (Math.random()-0.5)*120;
            let z = (Math.random()-0.5)*120;
            box.position.set(x, 0.75, z);
            box.userData = { searched: false, hasKey: i < 5 };
            scene.add(box);
            items.push(box);
            wallBoxes.push(new THREE.Box3().setFromObject(box));
        }

        // --- МОНСТР (БОЛЬШОЙ И СТРАШНЫЙ) ---
        const monster = new THREE.Group();
        const mBodyMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        
        // Огромное худое тело (рост 4.5 метра)
        const mTorso = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.05, 4.5), mBodyMat);
        mTorso.position.y = 2.25;
        monster.add(mTorso);

        const mHead = new THREE.Mesh(new THREE.SphereGeometry(0.4), mBodyMat);
        mHead.position.y = 4.7;
        monster.add(mHead);

        // Длинные руки до пола
        const armGeo = new THREE.CylinderGeometry(0.04, 0.04, 4);
        const lArm = new THREE.Mesh(armGeo, mBodyMat);
        lArm.position.set(-0.5, 3, 0); lArm.rotation.z = 0.2;
        const rArm = new THREE.Mesh(armGeo, mBodyMat);
        rArm.position.set(0.5, 3, 0); rArm.rotation.z = -0.2;
        monster.add(lArm, rArm);

        // Белые точки вместо глаз
        const eye = new THREE.Mesh(new THREE.SphereGeometry(0.05), new THREE.MeshBasicMaterial({ color: 0xffffff }));
        const e1 = eye.clone(); e1.position.set(-0.15, 4.8, 0.35);
        const e2 = eye.clone(); e2.position.set(0.15, 4.8, 0.35);
        monster.add(e1, e2);

        monster.position.set(40, 0, 40);
        scene.add(monster);

        // --- ЛОГИКА ---
        const controls = new PointerLockControls(camera, document.body);
        const ui = document.getElementById('ui');
        ui.addEventListener('click', () => { controls.lock(); document.getElementById('bgm').play(); });
        controls.addEventListener('lock', () => { ui.style.display = 'none'; document.getElementById('game-ui').style.display = 'block'; });
        controls.addEventListener('unlock', () => { if(keysFound < 5) ui.style.display = 'block'; });

        const keys = {};
        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        function checkCollision(pos, radius = 0.8) {
            const playerBox = new THREE.Box3().setFromCenterAndSize(pos, new THREE.Vector3(radius, 2, radius));
            for(let wall of wallBoxes) {
                if(playerBox.intersectsBox(wall)) return true;
            }
            return false;
        }

        const clock = new THREE.Clock();
        let mSpeed = 2.5;

        function update() {
            if(!controls.isLocked) return;
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // Движение игрока со скольжением
            const dir = new THREE.Vector3();
            if(keys['KeyW']) dir.z -= 1;
            if(keys['KeyS']) dir.z += 1;
            if(keys['KeyA']) dir.x -= 1;
            if(keys['KeyD']) dir.x += 1;
            dir.applyQuaternion(camera.quaternion);
            dir.y = 0; dir.normalize();

            if(dir.length() > 0) {
                const nextX = camera.position.x + dir.x * 6 * delta;
                if(!checkCollision(new THREE.Vector3(nextX, 1.7, camera.position.z))) camera.position.x = nextX;
                const nextZ = camera.position.z + dir.z * 6 * delta;
                if(!checkCollision(new THREE.Vector3(camera.position.x, 1.7, nextZ))) camera.position.z = nextZ;
                camera.position.y = 1.7 + Math.sin(time*10)*0.04;
            }

            // Мигание ламп
            lights.forEach(l => {
                if(Math.random() > 0.98) {
                    l.light.intensity = Math.random() > 0.5 ? 0 : 0.6;
                }
            });

            // ИИ Монстра
            monster.lookAt(camera.position.x, 0, camera.position.z);
            const mDir = new THREE.Vector3().subVectors(camera.position, monster.position).normalize();
            
            // Движение монстра (скольжение)
            const mNextX = monster.position.x + mDir.x * mSpeed * delta;
            if(!checkCollision(new THREE.Vector3(mNextX, 1, monster.position.z), 1.5)) monster.position.x = mNextX;
            const mNextZ = monster.position.z + mDir.z * mSpeed * delta;
            if(!checkCollision(new THREE.Vector3(monster.position.x, 1, mNextZ), 1.5)) monster.position.z = mNextZ;

            // Спецэффект дерганья монстра
            monster.children[0].rotation.z = Math.sin(time*25)*0.05;
            monster.children[1].position.x = Math.sin(time*30)*0.02;

            // Взаимодействие
            let interact = false;
            items.forEach(item => {
                if(!item.userData.searched && camera.position.distanceTo(item.position) < 3) {
                    interact = true;
                    if(keys['KeyE']) {
                        item.userData.searched = true;
                        item.material.color.setHex(0x222222);
                        if(item.userData.hasKey) {
                            keysFound++;
                            document.getElementById('key-count').innerText = `${keysFound} / 5`;
                            mSpeed += 0.5;
                        }
                        keys['KeyE'] = false;
                    }
                }
            });
            document.getElementById('interaction-text').style.display = interact ? 'block' : 'none';

            // Смерть
            if(camera.position.distanceTo(monster.position) < 2.5) {
                controls.unlock();
                ui.innerHTML = "<h1 class='glitch'>ТЫ СТАЛ ЧАСТЬЮ СТЕН</h1><p>Связь потеряна. Обнови страницу.</p>";
                ui.style.display = 'block';
                keysFound = -999;
            }

            if(keysFound >= 5) {
                ui.innerHTML = "<h1 style='color: #00ff00'>ВЫХОД НАЙДЕН</h1><p>Ты покинул Уровень 0.</p>";
                controls.unlock();
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
