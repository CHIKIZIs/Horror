<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web 3D Horror - Улучшенная версия</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        #ui, #game-ui {
            position: absolute;
            width: 100%;
            text-align: center;
            z-index: 10;
        }
        #ui {
            top: 40%;
            color: darkred;
            text-shadow: 2px 2px 5px black;
            cursor: pointer;
        }
        #game-ui {
            top: 20px;
            color: white;
            display: none;
            font-size: 1.2rem;
            text-shadow: 1px 1px 3px black;
        }
        #interaction-text {
            position: absolute;
            top: 60%;
            width: 100%;
            text-align: center;
            color: yellow;
            font-size: 1.5rem;
            display: none;
            z-index: 10;
        }
        h1 { font-size: 3rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; color: #ddd; }
        .red { color: red; }
    </style>
</head>
<body>
    <audio id="bgm" loop>
        <source src="1.mp4" type="audio/mp4">
    </audio>

    <div id="ui">
        <h1>ТЕМНАЯ ЗОНА</h1>
        <p>Управление: WASD - движение, Мышь - осмотреться</p>
        <p>Почини 5 генераторов [ E ], чтобы открыть выход.</p>
        <p class="red">Если фонарик мигает — беги.</p>
    </div>

    <div id="game-ui">
        Генераторы: <span id="gen-count">0 / 5</span><br>
        <span id="direction" style="color: #88ff88; font-weight: bold;">Направление: ⬆️ Прямо</span>
    </div>
    
    <div id="interaction-text">[E] Починить генератор</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // 1. ПРОГРАММНЫЕ ТЕКСТУРЫ (Чтобы не грузить внешние картинки)
        function createFloorTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#111'; ctx.fillRect(0,0,256,256);
            ctx.strokeStyle = '#222'; ctx.lineWidth = 2;
            for(let i=0; i<=256; i+=32) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,256); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(256,i); ctx.stroke();
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(40, 40); // Повторение текстуры на весь пол
            return tex;
        }

        function createWallTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#222'; ctx.fillRect(0,0,256,256);
            for(let i=0; i<5000; i++) {
                let v = Math.random() * 40 + 20;
                ctx.fillStyle = `rgb(${v},${v},${v})`;
                ctx.fillRect(Math.random()*256, Math.random()*256, 2, 2);
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
            return tex;
        }

        // 2. БАЗОВАЯ НАСТРОЙКА
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.FogExp2(0x000000, 0.08); // Видимость чуть больше (было 0.12)

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.8, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // 3. СВЕТ И ФОНАРИК
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.015);
        scene.add(ambientLight);

        const baseFlashlightIntensity = 2.5;
        const flashLight = new THREE.SpotLight(0xffeedd, baseFlashlightIntensity, 25, Math.PI / 6, 0.8, 1);
        flashLight.position.set(0, 0, 0);
        flashLight.target.position.set(0, 0, -1);
        flashLight.castShadow = true;
        camera.add(flashLight);
        camera.add(flashLight.target);
        scene.add(camera);

        // 4. ОКРУЖЕНИЕ: ЗАБРОШКА (Стены и пол с коллизиями)
        const floorMat = new THREE.MeshStandardMaterial({ map: createFloorTexture(), roughness: 0.9 });
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(120, 120), floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        const wallMat = new THREE.MeshStandardMaterial({ map: createWallTexture(), roughness: 1 });
        const walls = new THREE.Group();
        const wallBoundingBoxes = []; // Массив для проверки столкновений

        function createWall(x, z, width, depth) {
            const wall = new THREE.Mesh(new THREE.BoxGeometry(width, 5, depth), wallMat);
            wall.position.set(x, 2.5, z);
            wall.castShadow = true;
            wall.receiveShadow = true;
            
            // Настройка текстуры под размер стены
            wall.material = wallMat.clone();
            wall.material.map = wallMat.map.clone();
            wall.material.map.repeat.set(width > depth ? width/4 : depth/4, 1.25);
            
            walls.add(wall);

            // Создаем невидимую коробку (BoundingBox) для этой стены
            wall.updateMatrixWorld(true);
            const box = new THREE.Box3().setFromObject(wall);
            wallBoundingBoxes.push(box);
        }

        // Внешние стены
        createWall(0, -60, 120, 2); createWall(0, 60, 120, 2);
        createWall(-60, 0, 2, 120); createWall(60, 0, 2, 120);

        // Внутренние коридоры
        for(let i=0; i<18; i++) {
            let isHorizontal = Math.random() > 0.5;
            let len = 15 + Math.random() * 20;
            let px = (Math.random() - 0.5) * 90;
            let pz = (Math.random() - 0.5) * 90;
            
            if(Math.abs(px) < 15 && Math.abs(pz) < 15) continue; 
            createWall(px, pz, isHorizontal ? len : 2, isHorizontal ? 2 : len);
        }
        scene.add(walls);

        // 5. МЕХАНИКА: 5 ГЕНЕРАТОРОВ И ВЫХОД
        const generators = [];
        let fixedGenerators = 0;
        const totalGenerators = 5; // Больше генераторов
        
        const genGeo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
        const genPositions = [
            new THREE.Vector3(25, 0.75, -25),
            new THREE.Vector3(-35, 0.75, 15),
            new THREE.Vector3(15, 0.75, 35),
            new THREE.Vector3(-30, 0.75, -40),
            new THREE.Vector3(45, 0.75, 5)
        ];

        genPositions.forEach((pos, index) => {
            const mat = new THREE.MeshStandardMaterial({ color: 0x550000, emissive: 0x330000 });
            const gen = new THREE.Mesh(genGeo, mat);
            gen.position.copy(pos);
            gen.castShadow = true;
            gen.receiveShadow = true;
            
            const light = new THREE.PointLight(0xff0000, 1, 6);
            gen.add(light);
            
            gen.userData = { id: index, fixed: false, light: light };
            scene.add(gen);
            generators.push(gen);
        });

        // Выход
        const exitGeo = new THREE.BoxGeometry(4, 5, 0.5);
        const exitMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, transparent: true, opacity: 0 });
        const exitDoor = new THREE.Mesh(exitGeo, exitMat);
        exitDoor.position.set(0, 2.5, -58);
        scene.add(exitDoor);

        // 6. ЖУТКИЙ МОНСТР
        const monster = new THREE.Group();
        monster.position.set(0, 0, 50);
        
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 1 });
        const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.2, 4), bodyMat);
        torso.position.y = 3;
        torso.castShadow = true;
        monster.add(torso);

        const head = new THREE.Mesh(new THREE.SphereGeometry(0.4), bodyMat);
        head.position.y = 5.2;
        monster.add(head);

        const armGeo = new THREE.CylinderGeometry(0.1, 0.05, 3.5);
        const leftArm = new THREE.Mesh(armGeo, bodyMat);
        leftArm.position.set(-0.7, 3, 0); leftArm.rotation.z = Math.PI / 8;
        monster.add(leftArm);
        const rightArm = new THREE.Mesh(armGeo, bodyMat);
        rightArm.position.set(0.7, 3, 0); rightArm.rotation.z = -Math.PI / 8;
        monster.add(rightArm);

        // Глаза
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const lEye = new THREE.Mesh(new THREE.SphereGeometry(0.06), eyeMat);
        lEye.position.set(-0.15, 5.3, 0.35);
        const rEye = new THREE.Mesh(new THREE.SphereGeometry(0.06), eyeMat);
        rEye.position.set(0.15, 5.3, 0.35);
        monster.add(lEye, rEye);

        const monsterLight = new THREE.PointLight(0xff0000, 2, 10);
        monsterLight.position.y = 3;
        monster.add(monsterLight);

        scene.add(monster);

        // 7. УПРАВЛЕНИЕ И UI
        const controls = new PointerLockControls(camera, document.body);
        const ui = document.getElementById('ui');
        const gameUi = document.getElementById('game-ui');
        const interactionText = document.getElementById('interaction-text');
        const bgm = document.getElementById('bgm');

        ui.addEventListener('click', () => {
            controls.lock();
            bgm.play().catch(() => {});
        });

        controls.addEventListener('lock', () => {
            ui.style.display = 'none';
            gameUi.style.display = 'block';
        });

        controls.addEventListener('unlock', () => {
            if(!gameOver) {
                ui.style.display = 'block';
                gameUi.style.display = 'none';
            }
        });

        const move = { forward: false, backward: false, left: false, right: false, action: false };
        document.addEventListener('keydown', (e) => {
            if (e.code === 'KeyW') move.forward = true;
            if (e.code === 'KeyS') move.backward = true;
            if (e.code === 'KeyA') move.left = true;
            if (e.code === 'KeyD') move.right = true;
            if (e.code === 'KeyE') move.action = true;
        });
        document.addEventListener('keyup', (e) => {
            if (e.code === 'KeyW') move.forward = false;
            if (e.code === 'KeyS') move.backward = false;
            if (e.code === 'KeyA') move.left = false;
            if (e.code === 'KeyD') move.right = false;
            if (e.code === 'KeyE') move.action = false;
        });

        // 8. ИГРОВОЙ ЦИКЛ
        const clock = new THREE.Clock();
        const speed = 6.0;
        let monsterSpeed = 3.5;
        let gameOver = false;
        const playerBox = new THREE.Box3(); // Коробка игрока для коллизий

        function getActiveTarget() {
            if (fixedGenerators >= totalGenerators) return exitDoor.position;
            let nearest = null; let minDist = Infinity;
            generators.forEach(g => {
                if (!g.userData.fixed) {
                    const dist = camera.position.distanceTo(g.position);
                    if (dist < minDist) { minDist = dist; nearest = g.position; }
                }
            });
            return nearest;
        }

        function updateCompass() {
            const targetPos = getActiveTarget();
            if (!targetPos) return;

            const camDir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            camDir.y = 0; camDir.normalize();
            
            const targetDir = new THREE.Vector3().subVectors(targetPos, camera.position);
            targetDir.y = 0; targetDir.normalize();

            const angle = Math.atan2(camDir.clone().cross(targetDir).y, camDir.dot(targetDir));
            const degrees = angle * (180 / Math.PI);

            let arrow = "⬆️ Прямо";
            if (degrees > 20 && degrees <= 160) arrow = "⬅️ Налево";
            else if (degrees < -20 && degrees >= -160) arrow = "➡️ Направо";
            else if (Math.abs(degrees) > 160) arrow = "⬇️ Сзади";

            document.getElementById('direction').innerText = `Направление: ${arrow}`;
        }

        function animate() {
            if (gameOver) return;
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            if (controls.isLocked) {
                // Движение игрока
                const direction = new THREE.Vector3();
                if (move.forward) direction.z -= 1;
                if (move.backward) direction.z += 1;
                if (move.right) direction.x += 1;
                if (move.left) direction.x -= 1;
                direction.normalize();
                
                // Сохраняем старую позицию до перемещения
                const oldPosition = camera.position.clone();

                controls.moveRight(direction.x * speed * delta);
                controls.moveForward(-direction.z * speed * delta);

                // КОЛЛИЗИИ (Проверка на столкновение со стенами)
                // Создаем хитбокс игрока в новой позиции
                playerBox.setFromCenterAndSize(camera.position, new THREE.Vector3(1.2, 1.8, 1.2));
                
                let collision = false;
                for(let box of wallBoundingBoxes) {
                    if (playerBox.intersectsBox(box)) {
                        collision = true;
                        break;
                    }
                }
                
                // Если столкнулись, возвращаем камеру на шаг назад
                if (collision) {
                    camera.position.copy(oldPosition);
                }

                if(direction.length() > 0.1 && !collision) {
                    camera.position.y = 1.8 + Math.sin(time * 12) * 0.05; // Покачивание камеры
                }

                // Взаимодействие
                let canInteract = false;
                generators.forEach(gen => {
                    if (!gen.userData.fixed && camera.position.distanceTo(gen.position) < 3.5) {
                        canInteract = true;
                        if (move.action) {
                            gen.userData.fixed = true;
                            gen.material.color.setHex(0x005500);
                            gen.material.emissive.setHex(0x003300);
                            gen.userData.light.color.setHex(0x00ff00);
                            fixedGenerators++;
                            document.getElementById('gen-count').innerText = `${fixedGenerators} / ${totalGenerators}`;
                            monsterSpeed += 0.6; // Ускоряем монстра
                            
                            if (fixedGenerators >= totalGenerators) {
                                exitDoor.material.opacity = 0.9;
                                document.getElementById('direction').style.color = "#ffffff";
                            }
                        }
                    }
                });

                interactionText.style.display = canInteract ? 'block' : 'none';
                updateCompass();

                // Выход
                if (fixedGenerators >= totalGenerators && camera.position.distanceTo(exitDoor.position) < 5) {
                    gameOver = true;
                    controls.unlock();
                    gameUi.style.display = 'none';
                    ui.innerHTML = "<h1 style='color: white; font-size: 4rem;'>ТЫ СПАССЯ</h1><p>Свет поглотил тьму.</p>";
                    ui.style.display = 'block';
                    bgm.pause();
                }

                // ИИ Монстра
                monster.lookAt(camera.position.x, monster.position.y, camera.position.z);
                monster.translateZ(monsterSpeed * delta);
                torso.rotation.z = Math.sin(time * 6) * 0.15;
                monsterLight.intensity = 2 + Math.sin(time * 8) * 1.5;

                // ЭФФЕКТ МИГАЮЩЕГО ФОНАРИКА
                const distToMonster = camera.position.distanceTo(monster.position);
                if (distToMonster < 25) {
                    // Чем ближе, тем безумнее мигает фонарь
                    let flickerStrength = (25 - distToMonster) / 25; 
                    if (Math.random() < flickerStrength * 0.5) {
                        flashLight.intensity = baseFlashlightIntensity * Math.random();
                    } else if (Math.random() < 0.05) {
                        flashLight.intensity = 0; // Полностью гаснет на мгновение
                    } else {
                        flashLight.intensity = baseFlashlightIntensity;
                    }
                } else {
                    flashLight.intensity = baseFlashlightIntensity; // Монстр далеко, светит ровно
                }

                // Скример
                if (distToMonster < 2.5) {
                    gameOver = true;
                    controls.unlock();
                    gameUi.style.display = 'none';
                    interactionText.style.display = 'none';
                    ui.innerHTML = "<h1 style='color: red; font-size: 5rem;'>ПОЙМАН</h1><p>Он нашел тебя. Обновите страницу.</p>";
                    ui.style.display = 'block';
                }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
