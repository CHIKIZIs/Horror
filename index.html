<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web 3D Horror - Психбольница</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        #ui, #game-ui {
            position: absolute;
            width: 100%;
            text-align: center;
            z-index: 10;
        }
        #ui {
            top: 35%;
            color: #888;
            text-shadow: 2px 2px 5px black;
            cursor: pointer;
        }
        #game-ui {
            top: 20px;
            color: white;
            display: none;
            font-size: 1.2rem;
            text-shadow: 1px 1px 3px black;
        }
        #interaction-text {
            position: absolute;
            top: 60%;
            width: 100%;
            text-align: center;
            color: yellow;
            font-size: 1.5rem;
            display: none;
            z-index: 10;
        }
        h1 { font-size: 3rem; margin-bottom: 10px; color: #fff; }
        p { font-size: 1.2rem; color: #bbb; }
        .red { color: #aa0000; font-weight: bold; }
    </style>
</head>
<body>
    <audio id="bgm" loop>
        <source src="1.mp4" type="audio/mp4">
    </audio>

    <div id="ui">
        <h1>ЗАБРОШЕННАЯ ЛЕЧЕБНИЦА</h1>
        <p>Управление: WASD - движение, Мышь - осмотреться</p>
        <p>Найди 5 ключей в старых шкафчиках [ E ], чтобы открыть выход.</p>
        <p class="red">ОНО не может проходить сквозь стены, но ОНО ищет тебя.</p>
        <p>Кликни, чтобы начать</p>
    </div>

    <div id="game-ui">
        Ключи: <span id="gen-count">0 / 5</span><br>
        <span id="direction" style="color: #88ff88; font-weight: bold;">Направление: ⬆️ Прямо</span>
    </div>
    
    <div id="interaction-text">[E] Обыскать шкафчик</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // 1. ПРОГРАММНЫЕ ТЕКСТУРЫ (Белый грязный камень)
        function createFloorTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#b0b0b0'; ctx.fillRect(0,0,256,256);
            for(let i=0; i<10000; i++) {
                let v = Math.random() * 40 + 150;
                ctx.fillStyle = `rgb(${v},${v},${v})`;
                ctx.fillRect(Math.random()*256, Math.random()*256, 1, 1);
            }
            // Плитка
            ctx.strokeStyle = '#666'; ctx.lineWidth = 1;
            for(let i=0; i<=256; i+=64) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,256); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(256,i); ctx.stroke();
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(30, 30);
            return tex;
        }

        function createWallTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#d0d0d0'; ctx.fillRect(0,0,256,256); // Белые/серые стены
            // Грязь на стенах
            for(let i=0; i<5000; i++) {
                let v = Math.random() * 50 + 100;
                ctx.fillStyle = `rgba(${v},${v},${v}, 0.5)`;
                ctx.fillRect(Math.random()*256, Math.random()*256, 3, 3);
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
            return tex;
        }

        // 2. БАЗОВАЯ НАСТРОЙКА
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020202);
        scene.fog = new THREE.FogExp2(0x020202, 0.04); // Видимость увеличена (было 0.08)

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.8, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // 3. СВЕТ И ФОНАРИК
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.02);
        scene.add(ambientLight);

        const baseFlashlightIntensity = 2.5;
        const flashLight = new THREE.SpotLight(0xffeedd, baseFlashlightIntensity, 35, Math.PI / 5, 0.8, 1);
        flashLight.position.set(0, 0, 0);
        flashLight.target.position.set(0, 0, -1);
        flashLight.castShadow = true;
        camera.add(flashLight);
        camera.add(flashLight.target);
        scene.add(camera);

        // 4. ОКРУЖЕНИЕ: БОЛЬНИЦА (Стены и пол)
        const floorMat = new THREE.MeshStandardMaterial({ map: createFloorTexture(), roughness: 0.8 });
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(120, 120), floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        const wallMat = new THREE.MeshStandardMaterial({ map: createWallTexture(), roughness: 0.9 });
        const walls = new THREE.Group();
        const wallBoundingBoxes = [];

        function createWall(x, z, width, depth) {
            const wall = new THREE.Mesh(new THREE.BoxGeometry(width, 5, depth), wallMat);
            wall.position.set(x, 2.5, z);
            wall.castShadow = true;
            wall.receiveShadow = true;
            wall.material = wallMat.clone();
            wall.material.map = wallMat.map.clone();
            wall.material.map.repeat.set(width > depth ? width/8 : depth/8, 1);
            walls.add(wall);

            wall.updateMatrixWorld(true);
            const box = new THREE.Box3().setFromObject(wall);
            wallBoundingBoxes.push(box);
        }

        // Внешние стены
        createWall(0, -60, 120, 2); createWall(0, 60, 120, 2);
        createWall(-60, 0, 2, 120); createWall(60, 0, 2, 120);

        // Внутренние коридоры
        for(let i=0; i<20; i++) {
            let isHorizontal = Math.random() > 0.5;
            let len = 10 + Math.random() * 25;
            let px = (Math.random() - 0.5) * 90;
            let pz = (Math.random() - 0.5) * 90;
            if(Math.abs(px) < 15 && Math.abs(pz) < 15) continue; 
            createWall(px, pz, isHorizontal ? len : 2, isHorizontal ? 2 : len);
        }
        scene.add(walls);

        // Вспомогательные объекты (паллеты, столы)
        const propMat = new THREE.MeshStandardMaterial({ color: 0x443322, roughness: 1 });
        for(let i=0; i<15; i++) {
            let px = (Math.random() - 0.5) * 90;
            let pz = (Math.random() - 0.5) * 90;
            const prop = new THREE.Mesh(new THREE.BoxGeometry(2, 0.5, 2), propMat);
            prop.position.set(px, 0.25, pz);
            prop.castShadow = true;
            scene.add(prop);
            prop.updateMatrixWorld(true);
            wallBoundingBoxes.push(new THREE.Box3().setFromObject(prop)); // Тоже имеют коллизию
        }

        // 5. МЕХАНИКА: ШКАФЧИКИ И КЛЮЧИ
        const cabinets = [];
        let keysFound = 0;
        const totalKeys = 5;
        
        const cabinetGeo = new THREE.BoxGeometry(1.2, 2.5, 1);
        const cabinetMat = new THREE.MeshStandardMaterial({ color: 0x556666, roughness: 0.7 });
        
        // Создаем 15 шкафчиков, но только 5 с ключами
        for(let i=0; i<15; i++) {
            const cab = new THREE.Mesh(cabinetGeo, cabinetMat.clone());
            let px = (Math.random() - 0.5) * 100;
            let pz = (Math.random() - 0.5) * 100;
            cab.position.set(px, 1.25, pz);
            cab.castShadow = true;
            cab.receiveShadow = true;
            
            // Задаем, есть ли ключ
            cab.userData = { 
                searched: false, 
                hasKey: i < totalKeys // Первые 5 имеют ключ
            };
            
            scene.add(cab);
            cabinets.push(cab);
            
            cab.updateMatrixWorld(true);
            wallBoundingBoxes.push(new THREE.Box3().setFromObject(cab));
        }

        // Перемешиваем массив шкафчиков, чтобы ключи были рандомно распределены
        cabinets.sort(() => Math.random() - 0.5);

        // Выход
        const exitGeo = new THREE.BoxGeometry(4, 5, 0.5);
        const exitMat = new THREE.MeshStandardMaterial({ color: 0x88ff88, emissive: 0x225522, transparent: true, opacity: 0 });
        const exitDoor = new THREE.Mesh(exitGeo, exitMat);
        exitDoor.position.set(0, 2.5, -58);
        scene.add(exitDoor);

        // 6. БОЛЕЕ СТРАШНЫЙ МОНСТР (Высокий, черный, с белыми светящимися глазами)
        const monster = new THREE.Group();
        monster.position.set(0, 0, 50);
        
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 1 });
        // Очень вытянутое тело
        const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.1, 5), bodyMat);
        torso.position.y = 2.5;
        torso.castShadow = true;
        monster.add(torso);

        const head = new THREE.Mesh(new THREE.SphereGeometry(0.35), bodyMat);
        head.position.y = 5.2;
        monster.add(head);

        const armGeo = new THREE.CylinderGeometry(0.05, 0.05, 4.5);
        const leftArm = new THREE.Mesh(armGeo, bodyMat);
        leftArm.position.set(-0.5, 3, 0); leftArm.rotation.z = Math.PI / 10;
        monster.add(leftArm);
        const rightArm = new THREE.Mesh(armGeo, bodyMat);
        rightArm.position.set(0.5, 3, 0); rightArm.rotation.z = -Math.PI / 10;
        monster.add(rightArm);

        // Светящиеся жуткие глаза
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const lEye = new THREE.Mesh(new THREE.SphereGeometry(0.05), eyeMat);
        lEye.position.set(-0.15, 5.3, 0.3);
        const rEye = new THREE.Mesh(new THREE.SphereGeometry(0.05), eyeMat);
        rEye.position.set(0.15, 5.3, 0.3);
        monster.add(lEye, rEye);

        // Тусклая аура
        const monsterLight = new THREE.PointLight(0x330000, 1, 8);
        monsterLight.position.y = 3;
        monster.add(monsterLight);

        scene.add(monster);

        // 7. УПРАВЛЕНИЕ И UI
        const controls = new PointerLockControls(camera, document.body);
        const ui = document.getElementById('ui');
        const gameUi = document.getElementById('game-ui');
        const interactionText = document.getElementById('interaction-text');
        const bgm = document.getElementById('bgm');

        ui.addEventListener('click', () => {
            controls.lock();
            bgm.play().catch(() => {});
        });

        controls.addEventListener('lock', () => {
            ui.style.display = 'none';
            gameUi.style.display = 'block';
        });

        controls.addEventListener('unlock', () => {
            if(!gameOver) {
                ui.style.display = 'block';
                gameUi.style.display = 'none';
            }
        });

        const move = { forward: false, backward: false, left: false, right: false, action: false };
        document.addEventListener('keydown', (e) => {
            if (e.code === 'KeyW') move.forward = true;
            if (e.code === 'KeyS') move.backward = true;
            if (e.code === 'KeyA') move.left = true;
            if (e.code === 'KeyD') move.right = true;
            if (e.code === 'KeyE') move.action = true;
        });
        document.addEventListener('keyup', (e) => {
            if (e.code === 'KeyW') move.forward = false;
            if (e.code === 'KeyS') move.backward = false;
            if (e.code === 'KeyA') move.left = false;
            if (e.code === 'KeyD') move.right = false;
            if (e.code === 'KeyE') move.action = false;
        });

        // Функция проверки коллизий
        function checkCollision(position, boxSize) {
            const box = new THREE.Box3().setFromCenterAndSize(position, boxSize);
            for(let wallBox of wallBoundingBoxes) {
                if (box.intersectsBox(wallBox)) return true;
            }
            return false;
        }

        // 8. ИГРОВОЙ ЦИКЛ
        const clock = new THREE.Clock();
        const speed = 6.0;
        let monsterSpeed = 1.8; // Монстр стал медленнее
        let gameOver = false;
        const playerSize = new THREE.Vector3(1.0, 1.8, 1.0);
        const monsterSize = new THREE.Vector3(1.2, 5.0, 1.2);

        function getActiveTarget() {
            if (keysFound >= totalKeys) return exitDoor.position;
            let nearest = null; let minDist = Infinity;
            cabinets.forEach(cab => {
                if (!cab.userData.searched) {
                    const dist = camera.position.distanceTo(cab.position);
                    if (dist < minDist) { minDist = dist; nearest = cab.position; }
                }
            });
            return nearest;
        }

        function updateCompass() {
            const targetPos = getActiveTarget();
            if (!targetPos) return;

            const camDir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            camDir.y = 0; camDir.normalize();
            
            const targetDir = new THREE.Vector3().subVectors(targetPos, camera.position);
            targetDir.y = 0; targetDir.normalize();

            const angle = Math.atan2(camDir.clone().cross(targetDir).y, camDir.dot(targetDir));
            const degrees = angle * (180 / Math.PI);

            let arrow = "⬆️ Прямо";
            if (degrees > 25 && degrees <= 155) arrow = "⬅️ Налево";
            else if (degrees < -25 && degrees >= -155) arrow = "➡️ Направо";
            else if (Math.abs(degrees) > 155) arrow = "⬇️ Сзади";

            document.getElementById('direction').innerText = `Направление (радар): ${arrow}`;
        }

        // Функция для движения со скольжением (для игрока и монстра)
        function moveWithSliding(position, dirX, dirZ, amount, size) {
            // Пробуем сдвинуться по X
            position.x += dirX * amount;
            if (checkCollision(position, size)) {
                position.x -= dirX * amount; // Откат по X, если стена
            }
            // Пробуем сдвинуться по Z
            position.z += dirZ * amount;
            if (checkCollision(position, size)) {
                position.z -= dirZ * amount; // Откат по Z, если стена
            }
        }

        function animate() {
            if (gameOver) return;
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            if (controls.isLocked) {
                // Вектор направления камеры
                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                forward.y = 0; forward.normalize();
                const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                right.y = 0; right.normalize();

                const direction = new THREE.Vector3();
                if (move.forward) direction.add(forward);
                if (move.backward) direction.sub(forward);
                if (move.right) direction.add(right);
                if (move.left) direction.sub(right);
                if (direction.length() > 0) direction.normalize();

                // Движение игрока со СКОЛЬЖЕНИЕМ по стенам
                if (direction.length() > 0) {
                    moveWithSliding(camera.position, direction.x, direction.z, speed * delta, playerSize);
                    camera.position.y = 1.8 + Math.sin(time * 12) * 0.05; // Покачивание
                }

                // Взаимодействие со шкафчиками
                let canInteract = false;
                cabinets.forEach(cab => {
                    if (!cab.userData.searched && camera.position.distanceTo(cab.position) < 3.0) {
                        canInteract = true;
                        if (move.action) {
                            cab.userData.searched = true;
                            // Открываем шкафчик (визуально меняем цвет)
                            cab.material.color.setHex(0x333333);
                            
                            if (cab.userData.hasKey) {
                                keysFound++;
                                document.getElementById('gen-count').innerText = `${keysFound} / ${totalKeys}`;
                                interactionText.innerText = "Ключ найден!";
                                interactionText.style.color = "#00ff00";
                                monsterSpeed += 0.4; // Чуть ускоряем монстра за каждый ключ
                                
                                if (keysFound >= totalKeys) {
                                    exitDoor.material.opacity = 0.9;
                                    document.getElementById('direction').style.color = "#ffffff";
                                }
                            } else {
                                interactionText.innerText = "Пусто...";
                                interactionText.style.color = "#aaaaaa";
                            }
                            
                            // Возвращаем стандартный текст через 1.5 секунды
                            setTimeout(() => {
                                interactionText.innerText = "[E] Обыскать шкафчик";
                                interactionText.style.color = "yellow";
                            }, 1500);
                            
                            move.action = false; // Предотвращаем спам
                        }
                    }
                });

                if (interactionText.innerText === "[E] Обыскать шкафчик") {
                    interactionText.style.display = canInteract ? 'block' : 'none';
                } else {
                    interactionText.style.display = 'block'; // Показываем сообщение о находке
                }
                
                updateCompass();

                // Выход
                if (keysFound >= totalKeys && camera.position.distanceTo(exitDoor.position) < 5) {
                    gameOver = true;
                    controls.unlock();
                    gameUi.style.display = 'none';
                    ui.innerHTML = "<h1 style='color: white; font-size: 4rem;'>ТЫ СБЕЖАЛ</h1><p>Свет поглотил тьму.</p>";
                    ui.style.display = 'block';
                    bgm.pause();
                }

                // ИИ Монстра (Скольжение вдоль стен за игроком)
                monster.lookAt(camera.position.x, monster.position.y, camera.position.z);
                const monDir = new THREE.Vector3().subVectors(camera.position, monster.position);
                monDir.y = 0; monDir.normalize();
                
                moveWithSliding(monster.position, monDir.x, monDir.z, monsterSpeed * delta, monsterSize);

                // Жуткие анимации монстра (дерганье)
                torso.rotation.z = Math.sin(time * 20) * 0.1;
                head.rotation.x = Math.sin(time * 15) * 0.2;
                leftArm.rotation.x = Math.cos(time * 10) * 0.5;
                rightArm.rotation.x = Math.sin(time * 10) * 0.5;
                monsterLight.intensity = 1 + Math.sin(time * 10) * 0.5;

                // ЭФФЕКТ МИГАЮЩЕГО ФОНАРИКА
                const distToMonster = camera.position.distanceTo(monster.position);
                if (distToMonster < 25) {
                    let flickerStrength = (25 - distToMonster) / 25; 
                    if (Math.random() < flickerStrength * 0.5) {
                        flashLight.intensity = baseFlashlightIntensity * Math.random();
                    } else if (Math.random() < 0.05) {
                        flashLight.intensity = 0; 
                    } else {
                        flashLight.intensity = baseFlashlightIntensity;
                    }
                } else {
                    flashLight.intensity = baseFlashlightIntensity;
                }

                // Скример
                if (distToMonster < 2.5) {
                    gameOver = true;
                    controls.unlock();
                    gameUi.style.display = 'none';
                    interactionText.style.display = 'none';
                    ui.innerHTML = "<h1 style='color: red; font-size: 5rem;'>ОНО ЗДЕСЬ</h1><p>Обновите страницу.</p>";
                    ui.style.display = 'block';
                }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
